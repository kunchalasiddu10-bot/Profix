<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ProFix Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ef4444' stroke-width='2'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E">
    <style>
        body {
            background-color: #0b1120;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2.5rem;
            background:#FFFFFF;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 2px solid #ef4444; /* Red accent for admin */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .admin-icon {
            width: 48px;
            height: 48px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.875rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: var(--transition);
        }
        .form-control:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 1px #ef4444;
        }
        .btn-admin {
            background: #ef4444;
            color: var(--text-primary);
            border-radius: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: none;
        }
        .btn-admin:hover {
            background: #dc2626;
        }
        .back-link {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            transition: var(--transition);
        }
        .back-link:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <a href="/" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Return
    </a>

    <div class="auth-card glass-card" style="text-align: center;">
        <div class="admin-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <h2 style="font-size: 1.5rem; margin-bottom: 0.25rem; font-weight: 700; letter-spacing: -0.5px;">Command Center</h2>
        <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 2rem;">Authorized Personnel Only</p>
        
        <form style="text-align: left;">
            <div class="form-group">
                <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.5rem;">Admin ID</label>
                <input type="text" class="form-control" required>
            </div>
            <div class="form-group">
                <label style="display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-bottom: 0.5rem;">Passcode</label>
                <input type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-admin" style="width: 100%; margin-top: 1rem; padding: 0.875rem;">Authenticate</button>
        </form>
    </div>
    <script>
        const form = document.querySelector('form');
        const errorMsg = document.createElement('p');
        errorMsg.style.cssText = 'color:#ef4444;font-size:0.875rem;text-align:center;margin-top:1rem;display:none;';
        form.appendChild(errorMsg);

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const username = e.target.querySelector('input[type="text"]').value.trim();
            const password = e.target.querySelector('input[type="password"]').value;
            btn.textContent = 'Verifying Passcode...';
            btn.style.opacity = '0.7';
            btn.disabled = true;
            errorMsg.style.display = 'none';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, portal: 'admin' })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.textContent = '⛔ Access Denied. Invalid credentials.';
                    errorMsg.style.display = 'block';
                    btn.textContent = 'Authenticate';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }
            } catch(err) {
                errorMsg.textContent = 'Could not connect to server.';
                errorMsg.style.display = 'block';
                btn.textContent = 'Authenticate';
                btn.style.opacity = '1';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
